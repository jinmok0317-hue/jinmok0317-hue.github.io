<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- pixel gamepad -->
  <g fill="#b7ff5c">
    <rect x="6" y="12" width="20" height="9" rx="2"/>
    <rect x="4" y="14" width="4" height="9" rx="2"/>
    <rect x="24" y="14" width="4" height="9" rx="2"/>
  </g>
  <g fill="#0a0a0a">
    <!-- d-pad -->
    <rect x="9" y="15" width="6" height="2"/>
    <rect x="11" y="13" width="2" height="6"/>
    <!-- buttons -->
    <circle cx="21" cy="15" r="1.2"/>
    <circle cx="23.5" cy="17" r="1.2"/>
    <circle cx="18.5" cy="17" r="1.2"/>
    <circle cx="21" cy="19" r="1.2"/>
  </g>
</svg>
